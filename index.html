  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --dark: #0f172a;
      --dark2: #1e293b;
      --green-bg: #dcfce7;
      --green: #166534;
      --green-line: #86efac;
      --red-bg: #ffe4e6;
      --red: #9f1239;
      --amber-bg: #fef3c7;
      --amber: #92400e;
      --blue-bg: #dbeafe;
      --blue: #1e40af;
      --shadow: 0 18px 50px rgba(15, 23, 42, .08);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    button, textarea, select, input { font: inherit; }
    button { touch-action: manipulation; cursor: pointer; }
    .page { min-height: 100svh; padding: 16px; }
    .wrap { max-width: 1100px; margin: 0 auto; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .pad { padding: 18px; }
    .header {
      padding: 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
    }
    h1, h2, h3, p { margin-top: 0; }
    h1 { font-size: clamp(24px, 5vw, 34px); line-height: 1.1; margin-bottom: 8px; }
    h2 { font-size: clamp(20px, 4vw, 26px); line-height: 1.25; }
    h3 { font-size: 18px; margin-bottom: 10px; }
    .muted { color: var(--muted); }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .grid { display: grid; gap: 12px; }
    .two { grid-template-columns: 1fr; }
    .examGrid { display: grid; grid-template-columns: 1fr; }
    .btn {
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
      min-height: 48px;
    }
    .btn.primary { background: var(--dark); border-color: var(--dark); color: #fff; }
    .btn.danger { background: var(--red-bg); border-color: #fecdd3; color: var(--red); }
    .btn.warn { background: var(--amber-bg); border-color: #fde68a; color: var(--amber); }
    .btn.good { background: var(--green-bg); border-color: var(--green-line); color: var(--green); }
    .btn.blue { background: var(--blue-bg); border-color: #bfdbfe; color: var(--blue); }
    .btn.block { width: 100%; }
    .btn:disabled { opacity: .6; cursor: not-allowed; }
    .select, .input, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      color: var(--ink);
      padding: 12px;
      min-height: 48px;
    }
    .textarea { min-height: 260px; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 13px; line-height: 1.45; }
    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      background: #f1f5f9;
      padding: 6px 11px;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #f8fafc;
      padding: 14px;
    }
    .option {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 18px;
      padding: 15px;
      min-height: 56px;
      line-height: 1.35;
    }
    .option.selected { background: var(--dark); color: #fff; border-color: var(--dark); }
    .option.reviewCorrect { background: var(--green-bg); color: var(--green); border-color: var(--green-line); }
    .option.reviewWrong { background: var(--red-bg); color: var(--red); border-color: #fda4af; }
    .nav3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 18px; }
    .palette {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .palbtn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 12px;
      min-height: 44px;
      font-weight: 800;
    }
    .palbtn.current { background: var(--dark); color: #fff; border-color: var(--dark); }
    .palbtn.done { background: var(--green-bg); color: var(--green); border-color: var(--green-line); }
    .sidebar { border-top: 1px solid var(--line); background: #f8fafc; padding: 18px; }
    .hidden { display: none !important; }
    .modalBackdrop {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(15, 23, 42, .45);
    }
    .modal { max-width: 460px; width: 100%; background: #fff; border-radius: 24px; padding: 20px; box-shadow: var(--shadow); }
    .notice { border: 1px solid var(--line); border-radius: 18px; background: #f8fafc; padding: 14px; }
    .notice.warn { background: var(--amber-bg); border-color: #fde68a; color: #78350f; }
    .notice.good { background: var(--green-bg); border-color: var(--green-line); color: var(--green); }
    .notice.danger { background: var(--red-bg); border-color: #fda4af; color: var(--red); }
    .reviewItem { border: 1px solid var(--line); border-radius: 18px; background: #fff; padding: 14px; }
    .small { font-size: 13px; }
    .footerSpace { height: env(safe-area-inset-bottom); }
    @media (min-width: 780px) {
      .page { padding: 28px; }
      .pad { padding: 24px; }
      .header { padding: 24px; }
      .two { grid-template-columns: 1fr 1fr; }
      .examGrid { grid-template-columns: 1fr 280px; }
      .sidebar { border-top: 0; border-left: 1px solid var(--line); }
      .palette { grid-template-columns: repeat(5, 1fr); }
    }
    .noteRender { line-height: 1.7; font-size: 15px; }
    .noteRender h1 { font-size: clamp(20px, 4vw, 26px); margin-bottom: 4px; border-bottom: 2px solid var(--line); padding-bottom: 10px; }
    .noteRender h2 { font-size: 18px; margin-top: 24px; margin-bottom: 6px; }
    .noteRender h3 { font-size: 16px; margin-top: 18px; margin-bottom: 4px; }
    .noteRender p { margin: 8px 0; }
    .noteRender ul, .noteRender ol { padding-left: 22px; margin: 8px 0; }
    .noteRender li { margin: 4px 0; }
    .noteRender strong { font-weight: 700; }
    .noteRender em { font-style: italic; }
    .noteRender table { width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 14px; }
    .noteRender th { background: #f1f5f9; font-weight: 700; text-align: left; padding: 10px 12px; border: 1px solid var(--line); }
    .noteRender td { padding: 9px 12px; border: 1px solid var(--line); vertical-align: top; }
    .noteRender tr:nth-child(even) td { background: #f8fafc; }
    .noteRender blockquote { border-left: 3px solid var(--line); margin: 10px 0; padding: 6px 14px; color: var(--muted); }
    .noteRender code { background: #f1f5f9; border-radius: 5px; padding: 2px 5px; font-size: 13px; font-family: ui-monospace, monospace; }
    .noteRender pre { background: #f1f5f9; border-radius: 12px; padding: 14px; overflow-x: auto; }
    .noteRender pre code { background: none; padding: 0; }
    .noteRender hr { border: none; border-top: 1px solid var(--line); margin: 18px 0; }

    // ---- Supabase sync helpers (सब best-effort; offline पर app local से चलता रहता है) ----
    async function pullCloudSets() {
      if (!sb || !state.user) return;
      try {
        const { data, error } = await sb.from("exam_sets").select("*").order("created_at", { ascending: false });
        if (error || !data) return;
        let added = 0;
        data.forEach(row => {
          if (state.sets.some(s => s.cloudId === row.id)) return;
          try {
            const set = normalizeSet({ title: row.title, durationMinutes: row.duration_minutes, questions: row.questions });
            set.cloudId = row.id;
            state.sets.push(set);
            added++;
          } catch (e) { /* invalid cloud set — छोड़ें */ }
        });
        if (added) { saveSets(); }
      } catch (e) { /* network — ignore */ }
    }
    async function pushCloudSet(set) {
      if (!sb || !state.user) return;
      try {
        const { data, error } = await sb.from("exam_sets")
          .insert({ title: set.title, duration_minutes: set.durationMinutes, questions: set.questions })
          .select().single();
        if (!error && data) { set.cloudId = data.id; saveSets(); state.cloudMsg = "☁️ Uploaded to cloud — reload on the other device to see it."; render(); }
      } catch (e) { /* ignore */ }
    }
    async function pushCloudAttempt(r, outcomes) {
      if (!sb || !state.user) return;
      const base = { set_title: r.title, score: r.score, total: r.total, attempted: r.attempted, per_topic: r.perTopic, taker: state.user.email };
      async function doInsert(payload) {
        const { data } = await sb.from("attempts").insert(payload).select("id,created_at").single();
        if (data && data.id) {
          const results = loadResults();
          const saved = results.find(x => x.id === r.id);
          if (saved) { saved.cloudId = data.id; saved.cloudDate = data.created_at; saved.cloudTaker = state.user.email; saveResults(results); }
        }
      }
      try {
        await doInsert({ ...base, outcomes: outcomes || null });
      } catch (e) {
        // outcomes column may not exist yet — retry without it
        try { await doInsert(base); } catch (e2) { /* ignore */ }
      }
    }

    function uid() { return "quiz-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8); }
    function esc(s) { return String(s ?? "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c])); }
    // विषय/topic को मिलाने के लिए normalize: trim + एक space + lowercase. इससे "Polity"/"polity "/" polity" एक ही बनते हैं।
    function topicNorm(s) { return String(s ?? "").trim().replace(/\s+/g, " ").toLowerCase(); }
    function topicKey(subject, topic) { return topicNorm(subject) + "␟" + topicNorm(topic); }
    function topicLabel(subject, topic) { const s = String(subject ?? "").trim(); const t = String(topic ?? "").trim(); return t ? s + " • " + t : s; }
    // प्रश्न की unique पहचान: text+options का stable hash. एक ही प्रश्न = एक ही qid (अलग set में भी)।
    function hashQ(question, options) {
      const base = topicNorm(question) + "::" + (Array.isArray(options) ? options.map(topicNorm).join("|") : "");
      let h = 5381;
      for (let i = 0; i < base.length; i++) { h = ((h << 5) + h) ^ base.charCodeAt(i); h |= 0; }
      return "qx" + (h >>> 0).toString(36);
    }
    function normalizeSet(input) {
      let obj = input;
      if (Array.isArray(obj)) obj = { title: "New practice set", durationMinutes: 30, questions: obj };
      if (!obj || typeof obj !== "object") throw new Error("Need a JSON object or a questions array.");
      const questions = obj.questions;
      if (!Array.isArray(questions) || questions.length === 0) throw new Error("questions array is empty or missing.");
      const normalized = questions.map((q, idx) => {
        if (!q || typeof q !== "object") throw new Error(`Question ${idx + 1} is not a valid object.`);
        if (!q.question || typeof q.question !== "string") throw new Error(`Question ${idx + 1} is missing question text.`);
        if (!Array.isArray(q.options) || q.options.length < 2) throw new Error(`Question ${idx + 1} is missing options.`);
        if (typeof q.answer !== "number" || q.answer < 0 || q.answer >= q.options.length) throw new Error(`Question ${idx + 1} has an invalid answer index.`);
        // strict taxonomy validation — reject the whole set on an invalid subjectId/topicId.
        const sid = q.subjectId;
        if (!sid || !TAXONOMY[sid]) throw new Error(`Question ${idx + 1}: invalid subjectId "${sid ?? ""}". Valid: ${Object.keys(TAXONOMY).join(", ")}`);
        const tid = q.topicId;
        if (!tid || !TAXONOMY[sid].topics[tid]) throw new Error(`Question ${idx + 1}: invalid topicId "${tid ?? ""}" under "${sid}". Valid: ${Object.keys(TAXONOMY[sid].topics).join(", ")}`);
        return {
          id: q.id || `q-${idx + 1}`,
          qid: hashQ(q.question, q.options),
          subjectId: sid,
          topicId: tid,
          subject: TAXONOMY[sid].name,
          topic: TAXONOMY[sid].topics[tid],
          question: q.question,
          options: q.options.map(String),
          answer: q.answer,
          explanation: q.explanation || ""
        };
      });
      const duration = Number(obj.durationMinutes || obj.duration || 30);
      return {
        id: obj.id || uid(),
        title: obj.title || obj.name || "UPTET/SUPERTET practice set",
        durationMinutes: Number.isFinite(duration) && duration > 0 ? duration : 30,
        questions: normalized,
        createdAt: obj.createdAt || new Date().toISOString()
      };
    }
    function readJson(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }
    function saveSets() { localStorage.setItem(SETS_KEY, JSON.stringify(state.sets)); }
    function saveCurrent() { if (state.selectedSetId) localStorage.setItem(CURRENT_KEY, state.selectedSetId); }
    function readSessions() { return readJson(SESSION_KEY, {}); }
    function writeSessions(m) { localStorage.setItem(SESSION_KEY, JSON.stringify(m)); }
    // किसी एक set की session हटाएँ (default: active set) — बाकी exams की resume बची रहती है।
    function clearSession(setId) {
      const id = setId || (state.activeSet && state.activeSet.id);
      if (!id) return;
      const m = readSessions();
      if (id in m) { delete m[id]; writeSessions(m); }
    }
    function loadResults() { return readJson(RESULTS_KEY, []); }
    function saveResults(arr) { localStorage.setItem(RESULTS_KEY, JSON.stringify(arr)); }
    function loadBank() { return readJson(QBANK_KEY, {}); }
    function saveBank(b) { localStorage.setItem(QBANK_KEY, JSON.stringify(b)); }
    function getProcessedCloudIds() { return new Set(readJson(CLOUD_BANK_KEY, [])); }
    function markCloudIdProcessed(id) { const s = getProcessedCloudIds(); s.add(String(id)); localStorage.setItem(CLOUD_BANK_KEY, JSON.stringify([...s])); }
    function updateQBankFromOutcomes(outcomes, date) {
      if (!Array.isArray(outcomes) || !outcomes.length) return;
      const bank = loadBank();
      const ts = date || new Date().toISOString();
      outcomes.forEach(o => {
        if (!o.qid) return;
        const rec = bank[o.qid] || (bank[o.qid] = { qid: o.qid, history: [] });
        rec.subject = o.subject; rec.topic = o.topic || "";
        rec.question = o.question; rec.options = o.options; rec.answer = o.answer; rec.explanation = o.explanation || "";
        rec.history.push({ date: ts, outcome: o.outcome, chosen: o.chosen });
      });
      saveBank(bank);
    }
    function readNotes() { return readJson(NOTES_KEY, {}); }
    function saveNoteForSet(setId, text) { const n = readNotes(); n[setId] = text; localStorage.setItem(NOTES_KEY, JSON.stringify(n)); }
    function getNoteForSet(setId) { return readNotes()[setId] || ""; }
    function stableStringify(value) {
      if (!value || typeof value !== "object") return JSON.stringify(value ?? null);
      if (Array.isArray(value)) return "[" + value.map(stableStringify).join(",") + "]";
      return "{" + Object.keys(value).sort().map(k => JSON.stringify(k) + ":" + stableStringify(value[k])).join(",") + "}";
    }
    function normalizeCloudPerTopic(v) {
      if (!v) return {};
      if (typeof v === "string") {
        try { return JSON.parse(v) || {}; } catch { return {}; }
      }
      return typeof v === "object" ? v : {};
    }
    function cloudAttemptToResult(row) {
      return {
        id: "cloud-" + (row.id || uid()),
        cloudId: row.id || null,
        cloudDate: row.created_at || null,
        cloudTaker: row.taker || "",
        setId: "cloud",
        title: row.set_title || "Test",
        date: row.created_at || new Date().toISOString(),
        total: Number(row.total) || 0,
        attempted: Number(row.attempted) || 0,
        score: Number(row.score) || 0,
        durationMinutes: null,
        perTopic: normalizeCloudPerTopic(row.per_topic)
      };
    }
    function sameAttempt(a, b) {
      if (!a || !b) return false;
      if (a.id && b.id && a.id === b.id) return true;
      if (a.cloudId && b.cloudId && String(a.cloudId) === String(b.cloudId)) return true;
      const sameCore = a.title === b.title &&
        Number(a.score) === Number(b.score) &&
        Number(a.total) === Number(b.total) &&
        Number(a.attempted) === Number(b.attempted) &&
        stableStringify(a.perTopic || {}) === stableStringify(b.perTopic || {});
      if (!sameCore) return false;
      const da = Date.parse(a.date || a.cloudDate || "");
      const db = Date.parse(b.date || b.cloudDate || "");
      return Number.isFinite(da) && Number.isFinite(db) && Math.abs(da - db) <= 5 * 60 * 1000;
    }
    function mergeCloudAttemptRows(rows) {
      const results = loadResults();
      const processed = getProcessedCloudIds();
      let changed = false;
      (rows || []).forEach(row => {
        const cloudResult = cloudAttemptToResult(row);
        const existing = results.find(r => sameAttempt(r, cloudResult));
        // merge outcomes into question bank for any cloud row not yet processed (deduped by cloud row id)
        if (row.outcomes && row.id && !processed.has(String(row.id))) {
          updateQBankFromOutcomes(row.outcomes, row.created_at);
          markCloudIdProcessed(row.id);
        }
        if (existing) {
          if (!existing.cloudId && cloudResult.cloudId) {
            existing.cloudId = cloudResult.cloudId;
            existing.cloudDate = cloudResult.cloudDate;
            existing.cloudTaker = cloudResult.cloudTaker;
            changed = true;
          }
          return;
        }
        results.push(cloudResult);
        changed = true;
      });
      if (changed) {
        results.sort((a, b) => Date.parse(b.date || b.cloudDate || 0) - Date.parse(a.date || a.cloudDate || 0));
        saveResults(results);
      }
      return changed;
    }
    async function pullCloudAttempts() {
      if (!sb || !state.user) return false;
      try {
        const { data, error } = await sb.from("attempts").select("*").order("created_at", { ascending: false });
        if (error || !data) return false;
        return mergeCloudAttemptRows(data);
      } catch (e) { return false; }
    }
    // हर हल किए प्रश्न का outcome question-bank में रखें (recall/redo के लिए)। qid से dedup होता है।
    function updateQuestionBank(set, answers) {
      const bank = loadBank();
      const now = new Date().toISOString();
      set.questions.forEach((q, i) => {
        const qid = q.qid || hashQ(q.question, q.options);
        const chosen = answers[i];
        const outcome = chosen === null ? "skipped" : (chosen === q.answer ? "correct" : "wrong");
        const rec = bank[qid] || (bank[qid] = { qid, history: [] });
        // snapshot ताज़ा रखें ताकि set delete होने पर भी प्रश्न redo हो सके।
        rec.subject = q.subject; rec.topic = q.topic || "";
        rec.question = q.question; rec.options = q.options; rec.answer = q.answer; rec.explanation = q.explanation || "";
        rec.history.push({ date: now, outcome, chosen });
      });
      saveBank(bank);
    }
    // एक पूरा हुआ attempt record करें — question-bank हमेशा update होता है; results history सिर्फ असली tests के लिए (redo को छोड़कर)।
    function recordResultOnce() {
      if (state.resultRecorded || !state.activeSet) return;
      const set = state.activeSet;
      updateQuestionBank(set, state.answers);
      if (!set.isRedo) {
        const perTopic = {};
        set.questions.forEach((q, i) => {
          const key = topicKey(q.subject, q.topic);
          const t = perTopic[key] || (perTopic[key] = { label: topicLabel(q.subject, q.topic), correct: 0, total: 0, attempted: 0 });
          t.total++;
          if (state.answers[i] !== null) {
            t.attempted++;
            if (state.answers[i] === q.answer) t.correct++;
          }
        });
        const results = loadResults();
        results.unshift({
          id: uid(),
          setId: set.id,
          title: set.title,
          date: new Date().toISOString(),
          total: set.questions.length,
          attempted: state.answers.filter(a => a !== null).length,
          score: set.questions.reduce((s, q, i) => s + (state.answers[i] === q.answer ? 1 : 0), 0),
          durationMinutes: set.durationMinutes,
          perTopic
        });
        saveResults(results);
        const outcomes = set.questions.map((q, i) => {
          const qid = q.qid || hashQ(q.question, q.options);
          const chosen = state.answers[i];
          return { qid, subject: q.subject, topic: q.topic || "", question: q.question, options: q.options, answer: q.answer, explanation: q.explanation || "", outcome: chosen === null ? "skipped" : chosen === q.answer ? "correct" : "wrong", chosen };
        });
        pushCloudAttempt(results[0], outcomes); // cloud पर भेजें ताकि analysis किसी भी device से दिखे (best-effort)
      }
      state.resultRecorded = true;
    }
    // सभी attempts के topics को normalized key से जोड़कर weakness aggregate बनाएँ।
    function aggregateTopics(results) {
      const agg = {};
      results.forEach(r => {
        Object.entries(r.perTopic || {}).forEach(([k, v]) => {
          const a = agg[k] || (agg[k] = { label: v.label || k, correct: 0, total: 0, attempted: 0 });
          a.correct += v.correct; a.total += v.total; a.attempted += v.attempted;
        });
      });
      return agg;
    }
    // सिर्फ़ कभी-गलत प्रश्न, latest activity पहले। हर रिकॉर्ड पर derived status जोड़ें।
    function getMistakeRecords() {
      const bank = loadBank();
      const recs = Object.values(bank).filter(r => Array.isArray(r.history) && r.history.some(h => h.outcome === "wrong"));
      recs.forEach(r => {
        const last = r.history[r.history.length - 1];
        r._lastOutcome = last.outcome;
        r._lastDate = last.date;
        r._wrongCount = r.history.filter(h => h.outcome === "wrong").length;
        r._key = topicKey(r.subject, r.topic);
        r._label = topicLabel(r.subject, r.topic);
      });
      recs.sort((a, b) => (a._lastDate < b._lastDate ? 1 : -1));
      return recs;
    }
    function getFilteredMistakes() {
      let recs = getMistakeRecords();
      if (state.redoTopic !== "all") recs = recs.filter(r => r._key === state.redoTopic);
      if (state.redoLimit !== "all") recs = recs.slice(0, state.redoLimit);
      return recs;
    }
    function buildRedoSet(records, label) {
      return {
        id: "redo-" + Date.now().toString(36),
        title: "🔁 Redo: " + label,
        durationMinutes: Math.max(5, records.length),
        isRedo: true,
        questions: records.map((r, idx) => ({
          id: "q-" + (idx + 1), qid: r.qid, subject: r.subject || "", topic: r.topic || "",
          question: r.question, options: r.options.map(String), answer: r.answer, explanation: r.explanation || ""
        }))
      };
    }
    function saveSession() {
      if (!state.activeSet || !state.started) return;
      const m = readSessions();
      m[state.activeSet.id] = {
        setId: state.activeSet.id,
        answers: state.answers,
        index: state.index,
        remaining: state.remaining,
        started: state.started,
        paused: state.paused,
        finished: state.finished,
        savedAt: new Date().toISOString()
      };
      writeSessions(m);
    }
    function init() {
      state.sets = readJson(SETS_KEY, []);
      if (!state.sets.length) {
        state.sets = [normalizeSet(DEFAULT_SET)];
        saveSets();
      }
      const current = localStorage.getItem(CURRENT_KEY);
      state.selectedSetId = current && state.sets.some(s => s.id === current) ? current : state.sets[0].id;
      state.importText = JSON.stringify({ title: "New practice set", durationMinutes: 30, questions: [] }, null, 2);
      render();
      bootstrapAuth(); // session restore + cloud pull (async, best-effort)
    }
    async function bootstrapAuth() {
      if (!sb) return; // CDN/Supabase न हो तो app पूरी तरह local चलता है
      try {
        const { data } = await sb.auth.getSession();
        if (data && data.session) {
          state.user = data.session.user;
          await pullCloudSets();
          await pullCloudAttempts();
          render();
        } else if (state.view === "home") {
          state.view = "login"; render(); // पहली बार — login माँगें
        }
      } catch (e) { /* offline — local से चलता रहे */ }
    }
    function currentSet() { return state.sets.find(s => s.id === state.selectedSetId) || state.sets[0]; }
    function formatTime(total) {
      const t = Math.max(0, Number(total) || 0);
      const h = Math.floor(t / 3600);
      const m = Math.floor((t % 3600) / 60);
      const s = t % 60;
      return h > 0 ? `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}` : `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }
    function parseImportText(text) {
      let raw = String(text || "").trim();
      raw = raw.replace(/^```(?:json|javascript|js)?/i, "").replace(/```$/i, "").trim();
      try { return JSON.parse(raw); } catch (e) {}
      const startObj = raw.indexOf("{");
      const startArr = raw.indexOf("[");
      const first = startObj === -1 ? startArr : startArr === -1 ? startObj : Math.min(startObj, startArr);
      if (first >= 0) {
        const candidate = raw.slice(first).replace(/;\s*$/, "");
        try { return JSON.parse(candidate); } catch (e) {}
      }
      throw new Error("Could not parse JSON. Ask ChatGPT for a strict JSON object next time.");
    }
    function startTimer() {
      stopTimer();
      state.timerId = setInterval(() => {
        if (!state.started || state.finished || state.paused) return;
        state.remaining -= 1;
        if (state.remaining <= 0) {
          state.remaining = 0;
          state.finished = true;
          state.view = "result";
          stopTimer();
          recordResultOnce();
        }
        saveSession();
        render();
      }, 1000);
    }
    function stopTimer() { if (state.timerId) { clearInterval(state.timerId); state.timerId = null; } }
    function startSet(set, resumeSession) {
      state.activeSet = set;
      state.answers = resumeSession?.answers || Array(set.questions.length).fill(null);
      state.index = resumeSession?.index || 0;
      state.remaining = Number.isFinite(resumeSession?.remaining) ? resumeSession.remaining : set.durationMinutes * 60;
      state.started = true;
      state.paused = !!resumeSession?.paused;
      state.finished = false;
      state.resultRecorded = false;
      state.confirmAction = null;
      state.view = "exam";
      state.reviewFilter = "wrong";
      saveCurrent();
      saveSession();
      startTimer();
      render();
    }
    function finishSet() {
      state.finished = true;
      state.paused = false;
      state.view = "result";
      stopTimer();
      recordResultOnce();
      saveSession();
      render();
    }
    function resetSessionAndStart() {
      const set = currentSet();
      clearSession(set.id);
      startSet(set, null);
    }
    function getResumeSessionFor(setId) {
      const s = readSessions()[setId];
      if (s && s.setId === setId && s.started && !s.finished && Array.isArray(s.answers)) return s;
      return null;
    }
    function score() { return state.activeSet.questions.reduce((sum, q, i) => sum + (state.answers[i] === q.answer ? 1 : 0), 0); }
    function attempted() { return state.answers.filter(a => a !== null).length; }

    window.actions = {
      selectSet(id) { state.selectedSetId = id; saveCurrent(); render(); },
      showImport() { state.view = "import"; state.importError = ""; state.lastMessage = ""; render(); },
      backHome() { state.view = "home"; state.importError = ""; render(); },
      loadExample() { state.importText = JSON.stringify(DEFAULT_SET, null, 2); render(); },
      clearImport() { state.importText = ""; render(); },
      importInput(el) { state.importText = el.value; },
      saveImport(startNow) {
        try {
          const parsed = parseImportText(state.importText);
          const set = normalizeSet(parsed);
          const existingIndex = state.sets.findIndex(s => s.title === set.title && s.questions.length === set.questions.length);
          if (existingIndex >= 0) { clearSession(state.sets[existingIndex].id); state.sets.splice(existingIndex, 1); } // replaced set की orphan session हटाएँ
          state.sets.unshift(set);
          state.selectedSetId = set.id;
          saveSets(); saveCurrent();
          state.importError = "";
          state.lastMessage = `Set saved: ${set.title} (${set.questions.length} questions, ${set.durationMinutes} min)`;
          pushCloudSet(set); // cloud पर भेजें ताकि दूसरे device पर भी दिखे (best-effort)
          if (startNow) startSet(set, null); else { state.view = "home"; render(); }
        } catch (e) { state.importError = e.message || String(e); render(); }
      },
      async deleteCurrentSet() {
        if (state.sets.length <= 1) { state.lastMessage = "At least one set must remain."; render(); return; }
        const set = currentSet();
        const synced = set.cloudId && sb && state.user;
        // confirmation dialog — only this one exam is deleted.
        const msg = synced
          ? `Delete '${set.title}'?\n\n⚠️ This also deletes it from the cloud — this one exam will be gone from all devices.`
          : `Delete '${set.title}'? (this device only)`;
        if (!confirm(msg)) return;
        if (synced) {
          try {
            const { error } = await sb.from("exam_sets").delete().eq("id", set.cloudId); // only this one row
            if (error) throw error;
          } catch (e) { alert("Could not delete from cloud, please try again: " + (e.message || e)); return; }
        }
        clearSession(set.id); // deleted set की session भी हटाएँ
        state.sets = state.sets.filter(s => s.id !== set.id);
        state.selectedSetId = state.sets[0].id;
        saveSets(); saveCurrent();
        state.cloudMsg = synced ? "🗑️ Exam deleted from the cloud." : "";
        render();
      },
      start() {
        const set = currentSet();
        const resume = getResumeSessionFor(set.id);
        if (resume) {
          state.activeSet = set;
          state.view = "resume";
          render();
        } else startSet(set, null);
      },
      resume() { startSet(currentSet(), getResumeSessionFor(currentSet().id)); },
      fresh() { resetSessionAndStart(); },
      choose(i) { state.answers[state.index] = i; saveSession(); render(); },
      go(i) { if (state.paused) return; state.index = Math.max(0, Math.min(state.activeSet.questions.length - 1, i)); saveSession(); render(); },
      clearAnswer() { state.answers[state.index] = null; saveSession(); render(); },
      requestPause() { state.confirmAction = state.paused ? null : "pause"; if (state.paused) { state.paused = false; startTimer(); saveSession(); } render(); },
      requestSubmit() { state.confirmAction = "submit"; render(); },
      cancelConfirm() { state.confirmAction = null; render(); },
      confirm() {
        if (state.confirmAction === "pause") { state.paused = true; stopTimer(); saveSession(); }
        if (state.confirmAction === "submit") { finishSet(); return; }
        state.confirmAction = null;
        render();
      },
      review(filter) { state.reviewFilter = filter; render(); },
      homeFromResult() { stopTimer(); if (state.activeSet) clearSession(state.activeSet.id); state.view = "home"; state.started = false; state.finished = false; state.activeSet = null; render(); },
      // paused exam से Home — session बची रहती है ताकि बाद में resume हो सके।
      exitToHome() { saveSession(); stopTimer(); state.view = "home"; state.started = false; state.activeSet = null; render(); },
      async showHistory() {
        state.view = "history"; render();
        if (await pullCloudAttempts()) render();
      },
      async showRedo() { state.view = "redo"; render(); if (await pullCloudAttempts()) render(); },
      showNotes(setId) { state.notesText = getNoteForSet(setId); state.notesEditMode = !state.notesText; state.view = "notes"; render(); },
      editNote() { state.notesEditMode = true; render(); },
      notesInput(el) { state.notesText = el.value; },
      saveNote() { const t = state.notesText.trim(); saveNoteForSet(state.selectedSetId, t); state.notesEditMode = !t; render(); },
      deleteNote() { saveNoteForSet(state.selectedSetId, ""); state.notesText = ""; state.view = "home"; render(); },
      backFromNotes() { state.view = "home"; render(); },
      async loginFromForm() {
        const email = (document.getElementById("li-email") || {}).value || "";
        const pw = (document.getElementById("li-pw") || {}).value || "";
        if (!email || !pw) { state.authError = "Enter both email and password."; render(); return; }
        state.authBusy = true; state.authError = ""; render();
        try {
          const { data, error } = await sb.auth.signInWithPassword({ email: email.trim(), password: pw });
          if (error) { state.authError = error.message; state.authBusy = false; render(); return; }
          state.user = data.user; state.authBusy = false; state.authError = "";
          await pullCloudSets();
          await pullCloudAttempts();
          state.view = "home"; render();
        } catch (e) { state.authError = String(e.message || e); state.authBusy = false; render(); }
      },
      async logout() {
        try { if (sb) await sb.auth.signOut(); } catch (e) {}
        state.user = null; state.view = "login"; render();
      },
      skipLogin() { state.view = "home"; render(); },
      async showDashboard() {
        state.view = "dashboard"; state.dashboardData = null; render();
        if (!sb || !state.user) { state.dashboardData = []; render(); return; }
        try {
          const { data } = await sb.from("attempts").select("*").order("created_at", { ascending: false });
          state.dashboardData = data || [];
          mergeCloudAttemptRows(state.dashboardData);
        } catch (e) { state.dashboardData = []; }
        render();
      },
      redoSetTopic(v) { state.redoTopic = v; render(); },
      redoSetLimit(v) { state.redoLimit = v === "all" ? "all" : Number(v); render(); },
      redoSolveAll() {
        const recs = getFilteredMistakes();
        if (!recs.length) { alert("No questions in this filter."); return; }
        const label = state.redoTopic === "all" ? `${recs.length} wrong questions` : recs[0]._label;
        startSet(buildRedoSet(recs, label), null);
      },
      redoSolveOne(qid) {
        const rec = loadBank()[qid];
        if (!rec) { alert("Question not found."); return; }
        startSet(buildRedoSet([rec], "one question"), null);
      },
      clearHistory() {
        const msg = state.user
          ? "Clear cached history on this device? Cloud attempts will remain in the Cloud dashboard and may sync back after login/refresh."
          : "Clear the entire result history on this device? This cannot be undone.";
        if (!confirm(msg)) return;
        saveResults([]); render();
      },
      exportHistory() {
        const data = JSON.stringify(loadResults(), null, 2);
        const blob = new Blob([data], { type: "application/json" });

        const a = document.createElement("a");
        a.href = url;
        a.download = `quiz-history-${new Date().toISOString().slice(0,10)}.json`;
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);

        </div></section></main>`;
      }
      const accColor = pct => pct < 50 ? "var(--red)" : pct < 75 ? "var(--amber)" : "var(--green)";
      // कमज़ोर topics — सबसे कम accuracy पहले।
      const topics = Object.entries(aggregateTopics(results))
        .map(([k, v]) => ({ k, acc: v.attempted ? v.correct / v.attempted : 0, ...v }))
        .filter(t => t.attempted > 0)
        .sort((a, b) => a.acc - b.acc);
      const topicRows = topics.map(t => {
        const pct = Math.round(t.acc * 100);
        return `<div style="margin-bottom:14px">
          <div class="row" style="justify-content:space-between;margin-bottom:4px">
            <b>${esc(t.label)}</b>
            <span class="mono" style="color:${accColor(pct)}">${pct}% • ${t.correct}/${t.attempted} correct</span>
          </div>
          <div style="height:10px;border-radius:6px;background:var(--line);overflow:hidden">
            <div style="height:100%;width:${pct}%;background:${accColor(pct)}"></div>
          </div>
        </div>`;
      }).join("");
      const weakest = topics.slice(0, 3).map(t => esc(t.label)).join(", ");
      const attemptRows = results.map(r => {
        const pct = r.total ? Math.round((r.score / r.total) * 100) : 0;
        const d = new Date(r.date);
        const when = `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
        const taker = r.cloudTaker ? `${esc(r.cloudTaker)} • ` : "";
        return `<div class="stat" style="margin-bottom:10px">
          <div class="row" style="justify-content:space-between">
            <b>${esc(r.title)}</b>
            <span class="mono" style="color:${accColor(pct)}">${r.score}/${r.total} (${pct}%)</span>
          </div>
          <p class="muted small" style="margin-bottom:0">${taker}${when} • Attempted ${r.attempted}/${r.total}</p>
        </div>`;
      }).join("");
      return `<main class="wrap"><section class="card"><div class="pad">
        <h1>📊 History &amp; analysis</h1>
        <p class="muted">${results.length} tests completed. Accuracy per topic below — weakest first.</p>
        ${weakest ? `<div class="notice warn"><b>Weakest:</b> ${weakest} — practice these more.</div>` : ""}
        <h3 style="margin-top:18px">Topic-wise weakness</h3>
        ${topicRows}
        <h3 style="margin-top:18px">Past attempts</h3>
        ${attemptRows}
        <div class="row" style="margin-top:18px">
          <button class="btn primary" onclick="actions.backHome()">Home</button>
          <button class="btn blue" onclick="actions.exportHistory()">Export history (backup)</button>
          <button class="btn danger" onclick="actions.clearHistory()">Clear history</button>
        </div>
      </div></section></main>`;
    }

    function renderRedo() {
      const all = getMistakeRecords();
      if (!all.length) {
        return `<main class="wrap"><section class="card"><div class="pad">
          <h1>🔁 Redo deck (wrong questions)</h1>
          <div class="notice good">No wrong questions yet — great! Take a test and wrong questions will be added here automatically.</div>
          <div class="row" style="margin-top:16px"><button class="btn primary" onclick="actions.backHome()">Home</button></div>
        </div></section></main>`;
      }
      // topic dropdown — normalized topics present in the bank.
      const topicMap = {};
      all.forEach(r => { topicMap[r._key] = r._label; });
      const topicOpts = `<option value="all" ${state.redoTopic === "all" ? "selected" : ""}>All topics (${all.length})</option>` +
        Object.entries(topicMap).map(([k, label]) => {
          const n = all.filter(r => r._key === k).length;
          return `<option value="${esc(k)}" ${state.redoTopic === k ? "selected" : ""}>${esc(label)} (${n})</option>`;
        }).join("");
      const limitBtn = (v, lbl) => `<button class="btn ${String(state.redoLimit) === String(v) ? "primary" : ""}" onclick="actions.redoSetLimit('${v}')">${lbl}</button>`;
      const recs = getFilteredMistakes();
      const rows = recs.map(r => {
        const resolved = r._lastOutcome === "correct";
        const d = new Date(r._lastDate);
        const when = `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()}`;
        const qtext = r.question.length > 90 ? r.question.slice(0, 90) + "…" : r.question;
        return `<article class="reviewItem">
          <div class="row" style="justify-content:space-between;gap:8px">
            <span class="pill">${esc(r._label)}</span>
            <span class="mono small" style="color:${resolved ? "var(--green)" : "var(--red)"}">${resolved ? "✓ now correct" : "✗ still wrong"} • wrong ${r._wrongCount}× • ${when}</span>
          </div>
          <p style="margin:10px 0 8px">${esc(qtext)}</p>
          <button class="btn primary" onclick="actions.redoSolveOne('${esc(r.qid)}')">Solve this question</button>
        </article>`;
      }).join("");
      return `<main class="wrap"><section class="card"><div class="pad">
        <h1>🔁 Redo deck (wrong questions)</h1>
        <p class="muted">Wrong questions — newest first. Solve the whole batch or pick one from the list. Status turns green once you get it right.</p>
        <div class="grid" style="margin-top:8px">
          <label><b>Choose topic</b><select class="select" onchange="actions.redoSetTopic(this.value)">${topicOpts}</select></label>
          <div class="row">${limitBtn(15, "Recent 15")}${limitBtn(30, "Recent 30")}${limitBtn("all", "All")}</div>
        </div>
        <div class="row" style="margin-top:14px">
          <button class="btn good" onclick="actions.redoSolveAll()">Solve these ${recs.length} together</button>
          <button class="btn" onclick="actions.backHome()">Home</button>
        </div>
        <div class="grid" style="margin-top:18px">${rows}</div>
      </div></section></main>`;
    }

    function renderLogin() {
      return `<main class="wrap"><section class="card"><div class="pad">
        <h1>Login</h1>
        <p class="muted">Log in once for cloud sync. After that this device stays logged in.</p>
        ${state.authError ? `<div class="notice danger"><b>Error:</b> ${esc(state.authError)}</div>` : ""}
        <div class="grid" style="margin-top:8px">
          <label><b>Email</b><input id="li-email" class="select" type="email" autocomplete="username" placeholder="email" value="${esc((document.getElementById('li-email')||{}).value||'')}"></label>
          <label><b>Password</b><input id="li-pw" class="select" type="password" autocomplete="current-password" placeholder="password"></label>
        </div>
        <div class="row" style="margin-top:14px">
          <button class="btn primary" onclick="actions.loginFromForm()" ${state.authBusy ? "disabled" : ""}>${state.authBusy ? "Logging in…" : "Login"}</button>
          <button class="btn" onclick="actions.skipLogin()">Use offline for now</button>
        </div>
      </div></section></main>`;
    }

    function renderDashboard() {
      const rows = state.dashboardData;
      if (rows === null) {
        return `<main class="wrap"><section class="card"><div class="pad"><h1>🌐 Cloud dashboard</h1><p class="muted">Loading…</p></div></section></main>`;
      }
      if (!rows.length) {
        return `<main class="wrap"><section class="card"><div class="pad">
          <h1>🌐 Cloud dashboard</h1>
          <div class="notice">No attempts in the cloud yet. As soon as a test is submitted on any device, it will show here.</div>
          <div class="row" style="margin-top:16px"><button class="btn primary" onclick="actions.backHome()">Home</button></div>
        </div></section></main>`;
      }
      const accColor = pct => pct < 50 ? "var(--red)" : pct < 75 ? "var(--amber)" : "var(--green)";
      // cloud attempts → per_topic aggregate (सभी devices/takers मिलाकर)
      const agg = aggregateTopics(rows.map(r => ({ perTopic: r.per_topic || {} })));
      const topics = Object.entries(agg)
        .map(([k, v]) => ({ k, acc: v.attempted ? v.correct / v.attempted : 0, ...v }))
        .filter(t => t.attempted > 0).sort((a, b) => a.acc - b.acc);
      const topicRows = topics.map(t => {
        const pct = Math.round(t.acc * 100);
        return `<div style="margin-bottom:14px">
          <div class="row" style="justify-content:space-between;margin-bottom:4px"><b>${esc(t.label)}</b>
            <span class="mono" style="color:${accColor(pct)}">${pct}% • ${t.correct}/${t.attempted}</span></div>
          <div style="height:10px;border-radius:6px;background:var(--line);overflow:hidden"><div style="height:100%;width:${pct}%;background:${accColor(pct)}"></div></div>
        </div>`;
      }).join("");
      const weakest = topics.slice(0, 3).map(t => esc(t.label)).join(", ");
      const attemptRows = rows.map(r => {
        const pct = r.total ? Math.round((r.score / r.total) * 100) : 0;
        const d = new Date(r.created_at);
        const when = `${String(d.getDate()).padStart(2,"0")}/${String(d.getMonth()+1).padStart(2,"0")}/${d.getFullYear()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
        return `<div class="stat" style="margin-bottom:10px">
          <div class="row" style="justify-content:space-between"><b>${esc(r.set_title || "Test")}</b>
            <span class="mono" style="color:${accColor(pct)}">${r.score}/${r.total} (${pct}%)</span></div>
          <p class="muted small" style="margin-bottom:0">${esc(r.taker || "?")} • ${when} • Attempted ${r.attempted}/${r.total}</p>
        </div>`;
      }).join("");
      return `<main class="wrap"><section class="card"><div class="pad">
        <h1>🌐 Cloud dashboard</h1>
        <p class="muted">${rows.length} attempts from all devices — accuracy per topic, weakest first.</p>
        ${weakest ? `<div class="notice warn"><b>Weakest:</b> ${weakest}</div>` : ""}
        <h3 style="margin-top:18px">Topic-wise weakness</h3>
        ${topicRows}
        <h3 style="margin-top:18px">All attempts (cloud)</h3>
        ${attemptRows}
        <div class="row" style="margin-top:18px">
          <button class="btn primary" onclick="actions.backHome()">Home</button>
          <button class="btn blue" onclick="actions.showDashboard()">Refresh</button>
        </div>
      </div></section></main>`;
    }

    let _lastPushedView = null;
    function render() {
      const app = document.getElementById("app");
      // keep browser history in sync so the back button works
      if (state.view !== _lastPushedView) {
        if (_lastPushedView === null) history.replaceState({ view: state.view }, ""); // initial load — don't add an entry
        else history.pushState({ view: state.view }, "");
        _lastPushedView = state.view;
      }
      if (state.view === "login") app.innerHTML = renderLogin();
      else if (state.view === "dashboard") app.innerHTML = renderDashboard();
      else if (state.view === "home") app.innerHTML = renderHome();
      else if (state.view === "history") app.innerHTML = renderHistory();
      else if (state.view === "redo") app.innerHTML = renderRedo();
      else if (state.view === "import") app.innerHTML = renderImport();
      else if (state.view === "resume") app.innerHTML = renderResume();
      else if (state.view === "exam") app.innerHTML = renderExam();
      else if (state.view === "result") app.innerHTML = renderResult();
      else if (state.view === "notes") app.innerHTML = renderNotes();
    }

    window.addEventListener("popstate", e => {
      const v = (e.state && e.state.view) || "home";
      // safety: exam/result/resume need active state — fall back to home if missing
      if ((v === "exam" || v === "result" || v === "resume") && !state.activeSet) {
        _lastPushedView = "home"; state.view = "home"; render(); return;
      }
      _lastPushedView = v; // prevent a redundant pushState inside render()
      state.view = v;
      render();
    });

    document.addEventListener("visibilitychange", () => { if (document.hidden) saveSession(); });
    init();
  </script>
</body>
</html>
