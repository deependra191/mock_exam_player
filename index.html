    .header {

</head>

  <script>
    const SETS_KEY = "uptet_quiz_player_sets_v1";
    const CURRENT_KEY = "uptet_quiz_player_current_v1";

    const DEFAULT_SET = JSON.parse(document.getElementById("default-set").textContent);

    const state = {
      view: "home",
      sets: [],
      selectedSetId: null,
      activeSet: null,

      index: 0,
      remaining: 0,

      importError: "",
      lastMessage: "",

      reviewFilter: "wrong"

    function uid() { return "quiz-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 8); }
    function esc(s) { return String(s ?? "").replace(/[&<>'"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#39;","\"":"&quot;"}[c])); }
    function normalizeSet(input) {
      let obj = input;
      if (Array.isArray(obj)) obj = { title: "नया अभ्यास सेट", durationMinutes: 30, questions: obj };
      if (!obj || typeof obj !== "object") throw new Error("JSON object या questions array चाहिए।");
      const questions = obj.questions;
      if (!Array.isArray(questions) || questions.length === 0) throw new Error("questions array खाली या missing है।");
      const normalized = questions.map((q, idx) => {
        if (!q || typeof q !== "object") throw new Error(`प्रश्न ${idx + 1} valid object नहीं है।`);
        if (!q.question || typeof q.question !== "string") throw new Error(`प्रश्न ${idx + 1} में question text missing है।`);
        if (!Array.isArray(q.options) || q.options.length < 2) throw new Error(`प्रश्न ${idx + 1} में options missing हैं।`);
        if (typeof q.answer !== "number" || q.answer < 0 || q.answer >= q.options.length) throw new Error(`प्रश्न ${idx + 1} में answer index गलत है।`);
        return {
          id: q.id || `q-${idx + 1}`,
          subject: q.subject || "गणित",
          topic: q.topic || "",
          question: q.question,
          options: q.options.map(String),
          answer: q.answer,
          explanation: q.explanation || ""
        };
      });
      const duration = Number(obj.durationMinutes || obj.duration || 30);
      return {
        id: obj.id || uid(),
        title: obj.title || obj.name || "UPTET/SUPERTET अभ्यास सेट",
        durationMinutes: Number.isFinite(duration) && duration > 0 ? duration : 30,
        questions: normalized,
        createdAt: obj.createdAt || new Date().toISOString()
      };
    }
    function readJson(key, fallback) { try { return JSON.parse(localStorage.getItem(key)) ?? fallback; } catch { return fallback; } }
    function saveSets() { localStorage.setItem(SETS_KEY, JSON.stringify(state.sets)); }
    function saveCurrent() { if (state.selectedSetId) localStorage.setItem(CURRENT_KEY, state.selectedSetId); }
    function clearSession() { localStorage.removeItem(SESSION_KEY); }
    function saveSession() {
      if (!state.activeSet || !state.started) return;
      localStorage.setItem(SESSION_KEY, JSON.stringify({
        setId: state.activeSet.id,
        answers: state.answers,
        index: state.index,
        remaining: state.remaining,
        started: state.started,
        paused: state.paused,
        finished: state.finished,
        savedAt: new Date().toISOString()
      }));
    }
    function init() {
      state.sets = readJson(SETS_KEY, []);
      if (!state.sets.length) {
        state.sets = [normalizeSet(DEFAULT_SET)];
        saveSets();
      }
      const current = localStorage.getItem(CURRENT_KEY);
      state.selectedSetId = current && state.sets.some(s => s.id === current) ? current : state.sets[0].id;
      state.importText = JSON.stringify({ title: "नया अभ्यास सेट", durationMinutes: 30, questions: [] }, null, 2);
      render();
    }
    function currentSet() { return state.sets.find(s => s.id === state.selectedSetId) || state.sets[0]; }
    function formatTime(total) {
      const t = Math.max(0, Number(total) || 0);
      const h = Math.floor(t / 3600);
      const m = Math.floor((t % 3600) / 60);
      const s = t % 60;
      return h > 0 ? `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}` : `${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    }
    function parseImportText(text) {
      let raw = String(text || "").trim();
      raw = raw.replace(/^```(?:json|javascript|js)?/i, "").replace(/```$/i, "").trim();
      try { return JSON.parse(raw); } catch (e) {}
      const startObj = raw.indexOf("{");
      const startArr = raw.indexOf("[");
      const first = startObj === -1 ? startArr : startArr === -1 ? startObj : Math.min(startObj, startArr);
      if (first >= 0) {
        const candidate = raw.slice(first).replace(/;\s*$/, "");
        try { return JSON.parse(candidate); } catch (e) {}
      }
      throw new Error("JSON parse नहीं हो पाया। Future में ChatGPT से strict JSON object मांगें।");
    }
    function startTimer() {
      stopTimer();
      state.timerId = setInterval(() => {
        if (!state.started || state.finished || state.paused) return;
        state.remaining -= 1;
        if (state.remaining <= 0) {
          state.remaining = 0;
          state.finished = true;
          state.view = "result";
          stopTimer();
        }
        saveSession();
        render();
      }, 1000);
    }
    function stopTimer() { if (state.timerId) { clearInterval(state.timerId); state.timerId = null; } }
    function startSet(set, resumeSession) {
      state.activeSet = set;
      state.answers = resumeSession?.answers || Array(set.questions.length).fill(null);
      state.index = resumeSession?.index || 0;
      state.remaining = Number.isFinite(resumeSession?.remaining) ? resumeSession.remaining : set.durationMinutes * 60;
      state.started = true;
      state.paused = !!resumeSession?.paused;
      state.finished = false;
      state.confirmAction = null;
      state.view = "exam";
      state.reviewFilter = "wrong";
      saveCurrent();
      saveSession();
      startTimer();
      render();
    }
    function finishSet() {
      state.finished = true;
      state.paused = false;
      state.view = "result";
      stopTimer();
      saveSession();
      render();
    }
    function resetSessionAndStart() {
      clearSession();
      startSet(currentSet(), null);
    }
    function getResumeSessionFor(setId) {
      const s = readJson(SESSION_KEY, null);
      if (s && s.setId === setId && s.started && !s.finished && Array.isArray(s.answers)) return s;
      return null;
    }
    function score() { return state.activeSet.questions.reduce((sum, q, i) => sum + (state.answers[i] === q.answer ? 1 : 0), 0); }
    function attempted() { return state.answers.filter(a => a !== null).length; }

    window.actions = {
      selectSet(id) { state.selectedSetId = id; saveCurrent(); render(); },
      showImport() { state.view = "import"; state.importError = ""; state.lastMessage = ""; render(); },
      backHome() { state.view = "home"; state.importError = ""; render(); },
      loadExample() { state.importText = JSON.stringify(DEFAULT_SET, null, 2); render(); },
      clearImport() { state.importText = ""; render(); },
      importInput(el) { state.importText = el.value; },
      saveImport(startNow) {
        try {
          const parsed = parseImportText(state.importText);
          const set = normalizeSet(parsed);
          const existingIndex = state.sets.findIndex(s => s.title === set.title && s.questions.length === set.questions.length);
          if (existingIndex >= 0) state.sets.splice(existingIndex, 1);
          state.sets.unshift(set);
          state.selectedSetId = set.id;
          saveSets(); saveCurrent(); clearSession();
          state.importError = "";
          state.lastMessage = `सेट सेव हो गया: ${set.title} (${set.questions.length} प्रश्न, ${set.durationMinutes} मिनट)`;
          if (startNow) startSet(set, null); else { state.view = "home"; render(); }
        } catch (e) { state.importError = e.message || String(e); render(); }
      },
      deleteCurrentSet() {
        if (state.sets.length <= 1) { state.lastMessage = "कम से कम एक सेट रहना चाहिए।"; render(); return; }
        const set = currentSet();
        if (!confirm(`'${set.title}' हटाना है?`)) return;
        state.sets = state.sets.filter(s => s.id !== set.id);
        state.selectedSetId = state.sets[0].id;
        saveSets(); saveCurrent(); clearSession(); render();
      },
      start() {
        const set = currentSet();
        const resume = getResumeSessionFor(set.id);
        if (resume) {
          state.activeSet = set;
          state.view = "resume";
          render();
        } else startSet(set, null);
      },
      resume() { startSet(currentSet(), getResumeSessionFor(currentSet().id)); },
      fresh() { resetSessionAndStart(); },
      choose(i) { state.answers[state.index] = i; saveSession(); render(); },
      go(i) { if (state.paused) return; state.index = Math.max(0, Math.min(state.activeSet.questions.length - 1, i)); saveSession(); render(); },
      clearAnswer() { state.answers[state.index] = null; saveSession(); render(); },
      requestPause() { state.confirmAction = state.paused ? null : "pause"; if (state.paused) { state.paused = false; startTimer(); saveSession(); } render(); },
      requestSubmit() { state.confirmAction = "submit"; render(); },
      cancelConfirm() { state.confirmAction = null; render(); },
      confirm() {
        if (state.confirmAction === "pause") { state.paused = true; stopTimer(); saveSession(); }
        if (state.confirmAction === "submit") { finishSet(); return; }
        state.confirmAction = null;
        render();
      },
      review(filter) { state.reviewFilter = filter; render(); },
      homeFromResult() { stopTimer(); state.view = "home"; state.started = false; state.finished = false; state.activeSet = null; clearSession(); render(); }
    };

    function renderHome() {
      const set = currentSet();
      const resume = getResumeSessionFor(set.id);
      const options = state.sets.map(s => `<option value="${esc(s.id)}" ${s.id === state.selectedSetId ? "selected" : ""}>${esc(s.title)} — ${s.questions.length} प्रश्न / ${s.durationMinutes} मिनट</option>`).join("");
      return `<main class="wrap">
        <section class="card">
          <div class="pad">
            <h1>UPTET/SUPERTET Quiz Player</h1>
            <p class="muted">एक बार host करें, फिर हर नए practice set का JSON paste करके Safari/iPad पर solve करें।</p>
            ${state.lastMessage ? `<div class="notice good">${esc(state.lastMessage)}</div>` : ""}
            <div class="grid" style="margin-top:16px">
              <label><b>Practice set चुनें</b><select class="select" onchange="actions.selectSet(this.value)">${options}</select></label>
              <div class="grid two">
                <div class="stat"><b>शीर्षक</b><p class="muted" style="margin-bottom:0">${esc(set.title)}</p></div>
                <div class="stat"><b>पैटर्न</b><p class="muted" style="margin-bottom:0">${set.questions.length} प्रश्न • ${set.durationMinutes} मिनट</p></div>
              </div>
              ${resume ? `<div class="notice warn"><b>Resume available:</b> पिछले attempt में ${formatTime(resume.remaining)} समय बचा था।</div>` : ""}
              <div class="row">
                <button class="btn primary" onclick="actions.start()">${resume ? "Resume / Start" : "टेस्ट शुरू करें"}</button>
                <button class="btn blue" onclick="actions.showImport()">नया Question JSON Import करें</button>
                <button class="btn danger" onclick="actions.deleteCurrentSet()">Current set हटाएँ</button>
              </div>
            </div>
          </div>
        </section>
        <div class="footerSpace"></div>
      </main>`;
    }

    function renderResume() {
      const set = currentSet();
      const s = getResumeSessionFor(set.id);
      return `<main class="wrap"><section class="card"><div class="pad">
        <h1>पुराना attempt मिला</h1>
        <p class="muted">${esc(set.title)}</p>
        <div class="grid two">
          <div class="stat"><b>समय शेष</b><p class="mono" style="font-size:24px;margin-bottom:0">${formatTime(s.remaining)}</p></div>
          <div class="stat"><b>Attempted</b><p style="font-size:24px;margin-bottom:0">${s.answers.filter(a => a !== null).length}/${set.questions.length}</p></div>
        </div>
        <div class="row" style="margin-top:18px">
          <button class="btn good" onclick="actions.resume()">Resume करें</button>
          <button class="btn primary" onclick="actions.fresh()">Fresh start</button>
          <button class="btn" onclick="actions.backHome()">Back</button>
        </div>
      </div></section></main>`;
    }

    function renderImport() {
      return `<main class="wrap"><section class="card"><div class="pad">
        <h1>Question set import</h1>
        <p class="muted">ChatGPT से मिला strict JSON यहाँ paste करें। Format: <span class="mono">{ title, durationMinutes, questions }</span></p>
        ${state.importError ? `<div class="notice danger"><b>Error:</b> ${esc(state.importError)}</div>` : ""}
        <textarea class="textarea" oninput="actions.importInput(this)" placeholder="यहाँ JSON paste करें...">${esc(state.importText)}</textarea>
        <div class="row" style="margin-top:14px">
          <button class="btn primary" onclick="actions.saveImport(true)">Save & Start</button>
          <button class="btn" onclick="actions.saveImport(false)">Only Save</button>
          <button class="btn blue" onclick="actions.loadExample()">Current sample load करें</button>
          <button class="btn warn" onclick="actions.clearImport()">Clear</button>
          <button class="btn" onclick="actions.backHome()">Back</button>
        </div>
        <div class="notice" style="margin-top:14px"><b>Future prompt:</b> “Give only strict JSON for this quiz player: title, durationMinutes, questions array.”</div>
      </div></section></main>`;
    }

    function renderExam() {
      const set = state.activeSet;
      const q = set.questions[state.index];
      const opts = q.options.map((o, i) => `<button class="option ${state.answers[state.index] === i ? "selected" : ""}" onclick="actions.choose(${i})"><b>${String.fromCharCode(65+i)}.</b> ${esc(o)}</button>`).join("");
      const palette = set.questions.map((_, i) => `<button class="palbtn ${i === state.index ? "current" : state.answers[i] !== null ? "done" : ""}" onclick="actions.go(${i})">${i+1}</button>`).join("");
      return `<main class="wrap">
        ${state.confirmAction ? renderModal() : ""}
        <section class="card">
          <header class="header">
            <div>
              <h1>${esc(set.title)}</h1>
              <p class="mono" style="margin-bottom:0">समय शेष: ${formatTime(state.remaining)} | प्रश्न ${state.index+1}/${set.questions.length} | Attempted ${attempted()} | ${state.paused ? "Paused" : "Running"}</p>
            </div>
            <div class="row">
              <button class="btn ${state.paused ? "good" : "warn"}" onclick="actions.requestPause()">${state.paused ? "Resume" : "Pause"}</button>
              <button class="btn danger" onclick="actions.requestSubmit()">Submit</button>
            </div>
          </header>
          <div class="examGrid">
            <section class="pad">
              ${state.paused ? `<div class="notice warn" style="text-align:center;padding:28px"><h2>Test paused</h2><p>Timer रुक गया है। Resume दबाने पर प्रश्न फिर दिखेगा।</p><button class="btn good" onclick="actions.requestPause()">Resume</button></div>` : `
                <div class="row" style="justify-content:space-between;margin-bottom:12px">
                  <span class="pill">${esc(q.subject)}${q.topic ? " • " + esc(q.topic) : ""}</span>
                </div>
                <h2>${state.index + 1}. ${esc(q.question)}</h2>
                <div class="grid">${opts}</div>
                <div class="nav3">
                  <button class="btn" onclick="actions.go(${state.index - 1})">पिछला</button>
                  <button class="btn" onclick="actions.clearAnswer()">साफ करें</button>
                  <button class="btn primary" onclick="actions.go(${state.index + 1})">अगला</button>
                </div>`}
            </section>
            <aside class="sidebar">
              <h3>Question palette</h3>
              <div class="palette">${palette}</div>
              <p class="small muted" style="margin-top:12px">हरा = attempted, काला = current</p>
            </aside>
          </div>
        </section>
      </main>`;
    }
    function renderModal() {
      return `<div class="modalBackdrop"><div class="modal">
        <h2>Confirm</h2>
        <p>${state.confirmAction === "pause" ? "क्या आप टेस्ट pause करना चाहते हैं? Timer रुक जाएगा और प्रश्न छिप जाएगा।" : "क्या आप टेस्ट submit करना चाहते हैं? Current result दिखेगा और test समाप्त हो जाएगा।"}</p>
        <div class="grid two"><button class="btn" onclick="actions.cancelConfirm()">Cancel</button><button class="btn primary" onclick="actions.confirm()">Confirm</button></div>
      </div></div>`;
    }

    function renderResult() {
      const set = state.activeSet;
      const wrong = set.questions.map((q,i)=>({q,i})).filter(x => state.answers[x.i] !== null && state.answers[x.i] !== x.q.answer);
      const skipped = set.questions.map((q,i)=>({q,i})).filter(x => state.answers[x.i] === null);
      const correct = set.questions.map((q,i)=>({q,i})).filter(x => state.answers[x.i] === x.q.answer);
      const chosenList = state.reviewFilter === "wrong" ? wrong : state.reviewFilter === "skipped" ? skipped : correct;
      const reviewItems = chosenList.length ? chosenList.map(({q,i}) => {
        const chosen = state.answers[i];
        return `<article class="reviewItem">
          <span class="pill">${esc(q.subject)}${q.topic ? " • " + esc(q.topic) : ""}</span>
          <h3 style="margin-top:10px">${i+1}. ${esc(q.question)}</h3>
          ${chosen === null ? `<p class="muted"><b>आपका उत्तर:</b> छोड़ा गया</p>` : `<p class="${chosen === q.answer ? "" : ""}" style="color:${chosen === q.answer ? "var(--green)" : "var(--red)"}"><b>आपका उत्तर:</b> ${esc(q.options[chosen])}</p>`}
          <p style="color:var(--green)"><b>सही उत्तर:</b> ${esc(q.options[q.answer])}</p>
          <p class="notice"><b>व्याख्या:</b> ${esc(q.explanation)}</p>
        </article>`;
      }).join("") : `<div class="notice good">इस section में कोई प्रश्न नहीं है।</div>`;
      return `<main class="wrap"><section class="card"><div class="pad">
        <h1>टेस्ट परिणाम</h1>
        <div class="grid two">
          <div class="stat"><b>Score</b><p style="font-size:38px;font-weight:900;margin-bottom:0">${score()}/${set.questions.length}</p></div>
          <div class="stat"><b>Summary</b><p style="margin-bottom:0">Attempted: ${attempted()}<br>Unattempted: ${set.questions.length - attempted()}<br>Wrong: ${wrong.length}</p></div>
        </div>
        <div class="row" style="margin-top:18px">
          <button class="btn ${state.reviewFilter === "wrong" ? "danger" : ""}" onclick="actions.review('wrong')">गलत उत्तर (${wrong.length})</button>
          <button class="btn ${state.reviewFilter === "skipped" ? "warn" : ""}" onclick="actions.review('skipped')">छोड़े गए (${skipped.length})</button>
          <button class="btn ${state.reviewFilter === "correct" ? "good" : ""}" onclick="actions.review('correct')">सही (${correct.length})</button>
          <button class="btn primary" onclick="actions.homeFromResult()">Home</button>
        </div>
        <div class="grid" style="margin-top:18px">${reviewItems}</div>
      </div></section></main>`;
    }

    function render() {
      const app = document.getElementById("app");
      if (state.view === "home") app.innerHTML = renderHome();
      else if (state.view === "import") app.innerHTML = renderImport();
      else if (state.view === "resume") app.innerHTML = renderResume();
      else if (state.view === "exam") app.innerHTML = renderExam();
      else if (state.view === "result") app.innerHTML = renderResult();
    }

    document.addEventListener("visibilitychange", () => { if (document.hidden) saveSession(); });
    init();
  </script>
</body>
</html>
